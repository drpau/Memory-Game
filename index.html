<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog Breed Match - Memory Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #e94560;
            --secondary: #3dbdb5;
            --accent: #f9a825;
            --dark: #2d3436;
            --tile-back: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(180deg, #f0f2f5 0%, #e8eaed 100%);
            min-height: 100vh;
            color: var(--dark);
        }

        h1, h2 {
            font-family: 'Fredoka One', cursive;
        }

        /* All screens */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .screen.active {
            display: flex;
        }

        /* Loading Screen */
        #loading-screen {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-dog {
            font-size: 4rem;
            animation: bounce 1s infinite;
        }

        .loading-text {
            color: white;
            font-size: 1.2rem;
            margin-top: 15px;
            font-family: 'Fredoka One', cursive;
        }

        .loading-bar {
            width: 200px;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            margin-top: 15px;
            overflow: hidden;
        }

        .loading-progress {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #3dbdb5);
            width: 0%;
            animation: load 1.5s ease-in-out forwards;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes load {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* Welcome Screen */
        .welcome-title {
            font-size: 2.5rem;
            color: #4a4a6a;
            margin-bottom: 10px;
            text-align: center;
        }

        .welcome-tagline {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 30px;
        }

        .welcome-dog {
            font-size: 4rem;
            margin-bottom: 15px;
            animation: pawWave 2s ease-in-out infinite;
        }

        @keyframes pawWave {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-content {
            animation: fadeInUp 0.5s ease;
            text-align: center;
        }

        /* Buttons */
        .btn {
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, #ff6b6b 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--secondary) 0%, #5ee7df 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(61, 189, 181, 0.3);
        }

        .btn-restart {
            background: #f9a825;
            color: var(--dark);
        }

        .btn-menu {
            background: #2d3436;
            color: white;
        }

        .btn-large {
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 25px;
        }

        /* Name Input */
        .name-screen-title {
            font-size: 1.8rem;
            color: #4a4a6a;
            margin-bottom: 25px;
        }

        .name-input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .name-input {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .name-input label {
            font-weight: 700;
            margin-bottom: 5px;
            color: #555;
        }

        .name-input input {
            padding: 10px 20px;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            width: 200px;
            text-align: center;
            font-family: inherit;
        }

        .name-input input:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Mode Selection */
        .mode-title {
            font-size: 1.8rem;
            color: #4a4a6a;
            margin-bottom: 25px;
        }

        .mode-buttons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mode-btn {
            padding: 20px 40px;
            font-size: 1.2rem;
            font-family: 'Fredoka One', cursive;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mode-btn:hover {
            transform: scale(1.05);
        }

        .mode-btn.single {
            background: linear-gradient(135deg, var(--primary) 0%, #ff6b6b 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
        }

        .mode-btn.two {
            background: linear-gradient(135deg, var(--secondary) 0%, #5ee7df 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(61, 189, 181, 0.4);
        }

        /* Game Screen */
        #game-screen {
            padding: 15px;
        }

        .scoreboard {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .score-item {
            text-align: center;
            padding: 10px 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            min-width: 100px;
        }

        .score-label {
            font-weight: 700;
            font-size: 0.9rem;
            color: #666;
        }

        .score-value {
            font-family: 'Fredoka One', cursive;
            font-size: 1.5rem;
            color: var(--primary);
        }

        .timer-display {
            font-family: 'Fredoka One', cursive;
            font-size: 1.5rem;
            color: #4a4a6a;
            padding: 10px 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .timer-display.urgent {
            color: var(--primary);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Game Board */
        .game-board {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            max-width: 700px;
            width: 100%;
            margin: 15px auto;
        }

        .tile {
            aspect-ratio: 1;
            perspective: 1000px;
            cursor: pointer;
        }

        .tile-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.5s;
            transform-style: preserve-3d;
        }

        .tile.flipped .tile-inner {
            transform: rotateY(180deg);
        }

        .tile.matched {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.5s, visibility 0.5s;
        }

        .tile-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tile-front {
            background: var(--tile-back);
            background-size: cover;
        }

        .tile-front::before {
            content: '🐾';
            font-size: 2rem;
            opacity: 0.5;
        }

        .tile-back {
            background: white;
            transform: rotateY(180deg);
            border: 2px solid var(--secondary);
            padding: 5px;
        }

        .tile-back img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 5px;
        }

        /* Game Controls */
        .game-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        /* Winner Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px 50px;
            border-radius: 20px;
            text-align: center;
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-content h2 {
            font-family: 'Fredoka One', cursive;
            color: var(--primary);
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .modal-content p {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 20px;
        }

        .modal-time {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 15px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .game-board {
                grid-template-columns: repeat(4, 1fr);
                gap: 6px;
            }
            
            .welcome-title {
                font-size: 1.8rem;
            }
            
            .mode-btn {
                padding: 15px 25px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="screen active">
        <div class="loading-dog">🐕</div>
        <div class="loading-text">Loading...</div>
        <div class="loading-bar">
            <div class="loading-progress"></div>
        </div>
    </div>

    <!-- Welcome Screen -->
    <div id="welcome-screen" class="screen">
        <div class="welcome-content">
            <div class="welcome-dog">🐾</div>
            <h1 class="welcome-title">Dog Breed Match</h1>
            <p class="welcome-tagline">Test your memory with adorable dog breeds!</p>
            <button class="btn btn-primary btn-large" onclick="showNameScreen()">Start Game</button>
        </div>
    </div>

    <!-- Name Input Screen -->
    <div id="name-screen" class="screen">
        <h2 class="name-screen-title">Who's Playing?</h2>
        <div class="name-input-group">
            <div class="name-input">
                <label>Player 1</label>
                <input type="text" id="p1-name" placeholder="Enter name" value="Player 1">
            </div>
            <div class="name-input" id="p2-input">
                <label>Player 2</label>
                <input type="text" id="p2-name" placeholder="Enter name" value="Player 2">
            </div>
        </div>
        <button class="btn btn-primary" onclick="showModeScreen()">Continue</button>
    </div>

    <!-- Mode Selection Screen -->
    <div id="mode-screen" class="screen">
        <h2 class="mode-title">Choose Your Mode</h2>
        <div class="mode-buttons">
            <button class="mode-btn single" onclick="startGame('single')">Single Player</button>
            <button class="mode-btn two" onclick="startGame('two')">Two Players</button>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
        <div class="scoreboard">
            <div class="score-item" id="p1-score-box">
                <div class="score-label" id="p1-label">Player 1</div>
                <div class="score-value" id="p1-score">0</div>
            </div>
            <div class="timer-display" id="timer">00:00</div>
            <div class="score-item" id="p2-score-box" style="display: none;">
                <div class="score-label" id="p2-label">Player 2</div>
                <div class="score-value" id="p2-score">0</div>
            </div>
        </div>
        
        <div class="game-board" id="game-board"></div>
        
        <div class="game-controls">
            <button class="btn btn-restart" onclick="restartGame()">Restart</button>
            <button class="btn btn-menu" onclick="showWelcomeScreen()">Menu</button>
        </div>
    </div>

    <!-- Winner Modal -->
    <div id="winner-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="winner-text">Player 1 Wins!</h2>
            <p id="winner-score">Score: 0</p>
            <div class="modal-time" id="game-time"></div>
            <button class="btn btn-primary" onclick="restartGame()">Play Again</button>
            <button class="btn btn-menu" onclick="showWelcomeScreen()">Main Menu</button>
        </div>
    </div>

    <script>
        // Dog breed data with images
        const dogBreeds = [
            { name: 'Labrador', image: 'images/001-cartoon-caricature-of-a-labrador-retriev.png' },
            { name: 'German Shepherd', image: 'images/001-cartoon-caricature-of-a-german-shepherd-.png' },
            { name: 'Golden Retriever', image: 'images/001-cartoon-caricature-of-a-golden-retriever.png' },
            { name: 'French Bulldog', image: 'images/001-cartoon-caricature-of-a-french-bulldog-d.png' },
            { name: 'Bulldog', image: 'images/001-cartoon-caricature-of-a-bulldog-dog-face.png' },
            { name: 'Poodle', image: 'images/001-cartoon-caricature-of-a-poodle-dog-face-.png' },
            { name: 'Beagle', image: 'images/001-cartoon-caricature-of-a-beagle-dog-face-.png' },
            { name: 'Rottweiler', image: 'images/001-cartoon-caricature-of-a-rottweiler-dog-f.png' },
            { name: 'Yorkshire Terrier', image: 'images/001-cartoon-caricature-of-a-yorkshire-terrie.png' },
            { name: 'Boxer', image: 'images/001-cartoon-caricature-of-a-boxer-dog-face-f.png' },
            { name: 'Dachshund', image: 'images/001-cartoon-caricature-of-a-dachshund-dog-fa.png' },
            { name: 'Siberian Husky', image: 'images/001-cartoon-caricature-of-a-siberian-husky-d.png' }
        ];

        let gameMode = 'single';
        let scores = { p1: 0, p2: 0 };
        let currentPlayer = 1;
        let flippedTiles = [];
        let matchedPairs = 0;
        let isLocked = false;
        
        let timerInterval = null;
        let secondsElapsed = 0;
        let player1Name = 'Player 1';
        let player2Name = 'Player 2';

        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function initWizard() {
            setTimeout(() => {
                document.getElementById('loading-screen').classList.add('hidden');
                showScreen('welcome-screen');
            }, 1500);
        }

        function showNameScreen() {
            showScreen('name-screen');
        }

        function showModeScreen() {
            player1Name = document.getElementById('p1-name').value.trim() || 'Player 1';
            player2Name = document.getElementById('p2-name').value.trim() || 'Player 2';
            
            if (gameMode === 'two') {
                document.getElementById('p2-input').style.display = 'flex';
            }
            showScreen('mode-screen');
        }

        function showWelcomeScreen() {
            document.getElementById('winner-modal').classList.remove('active');
            stopTimer();
            showScreen('welcome-screen');
        }

        function startGame(mode) {
            gameMode = mode;
            
            const p2Box = document.getElementById('p2-score-box');
            
            if (mode === 'single') {
                p2Box.style.display = 'none';
            } else {
                p2Box.style.display = 'block';
            }
            
            document.getElementById('p1-label').textContent = player1Name;
            document.getElementById('p2-label').textContent = player2Name;
            
            showScreen('game-screen');
            initGame();
        }

        function initGame() {
            scores = { p1: 0, p2: 0 };
            currentPlayer = 1;
            flippedTiles = [];
            matchedPairs = 0;
            isLocked = false;
            
            updateScoreboard();
            createBoard();
            startTimer();
        }

        function startTimer() {
            stopTimer();
            secondsElapsed = 0;
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                secondsElapsed++;
                updateTimerDisplay();
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(secondsElapsed / 60);
            const seconds = secondsElapsed % 60;
            const timerEl = document.getElementById('timer');
            timerEl.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            if (secondsElapsed >= 120) {
                timerEl.classList.add('urgent');
            } else {
                timerEl.classList.remove('urgent');
            }
        }

        function formatTime(totalSeconds) {
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            return `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        function createBoard() {
            const board = document.getElementById('game-board');
            board.innerHTML = '';

            const tiles = [...dogBreeds, ...dogBreeds];
            const shuffled = shuffle(tiles);

            shuffled.forEach((breed, index) => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.dataset.index = index;
                tile.dataset.breed = breed.name;
                tile.onclick = () => flipTile(tile);

                tile.innerHTML = `
                    <div class="tile-inner">
                        <div class="tile-face tile-front"></div>
                        <div class="tile-face tile-back">
                            <img src="${breed.image}" alt="${breed.name}">
                        </div>
                    </div>
                `;

                board.appendChild(tile);
            });
        }

        function flipTile(tile) {
            if (isLocked || tile.classList.contains('flipped') || tile.classList.contains('matched')) {
                return;
            }

            tile.classList.add('flipped');
            flippedTiles.push(tile);

            if (flippedTiles.length === 2) {
                checkMatch();
            }
        }

        function checkMatch() {
            isLocked = true;
            const [tile1, tile2] = flippedTiles;
            const match = tile1.dataset.breed === tile2.dataset.breed;

            if (match) {
                handleMatch(tile1, tile2);
            } else {
                handleMismatch(tile1, tile2);
            }
        }

        function handleMatch(tile1, tile2) {
            setTimeout(() => {
                tile1.classList.add('matched');
                tile2.classList.add('matched');
                matchedPairs++;
                
                if (gameMode === 'single') {
                    scores.p1++;
                } else {
                    scores[currentPlayer === 1 ? 'p1' : 'p2']++;
                }
                
                updateScoreboard();
                flippedTiles = [];
                isLocked = false;
                
                if (matchedPairs === 12) {
                    checkGameEnd();
                }
            }, 300);
        }

        function handleMismatch(tile1, tile2) {
            setTimeout(() => {
                tile1.classList.remove('flipped');
                tile2.classList.remove('flipped');
                
                if (gameMode === 'two') {
                    currentPlayer = currentPlayer === 1 ? 2 : 1;
                    updateScoreboard();
                }
                
                flippedTiles = [];
                isLocked = false;
            }, 1000);
        }

        function updateScoreboard() {
            document.getElementById('p1-score').textContent = scores.p1;
            document.getElementById('p2-score').textContent = scores.p2;
        }

        function checkGameEnd() {
            stopTimer();
            
            const winner = gameMode === 'single' ? player1Name : (scores.p1 > scores.p2 ? player1Name : player2Name);
            const winScore = Math.max(scores.p1, scores.p2);
            
            document.getElementById('winner-text').textContent = `${winner} Wins!`;
            document.getElementById('winner-score').textContent = `${player1Name}: ${scores.p1} | ${player2Name}: ${scores.p2}`;
            document.getElementById('game-time').textContent = `Time: ${formatTime(secondsElapsed)}`;
            
            document.getElementById('winner-modal').classList.add('active');
        }

        function restartGame() {
            document.getElementById('winner-modal').classList.remove('active');
            initGame();
        }

        // Initialize
        window.onload = initWizard;
    </script>
</body>
</html>
