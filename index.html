    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --dark: #2C3E50;
            --light: #F7F9FC;

        }

        * {

            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;

            min-height: 100vh;
            margin: 0;
    /* Loading Screen */
    #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;

        justify-content: center;

    }
    #loading-screen.hidden {

    .loading-dog {
        font-size: 5rem;

    }

    .loading-progress {
        height: 100%;
        background: linear-gradient(90deg, #e94560, #0f3460);
        width: 0%;

    }
    @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-20px); }
    }
    @keyframes load {
        0% { width: 0%; }
        100% { width: 100%; }
    }
            background: linear-gradient(180deg, #f5f7fa 0%, #e4e8ec 100%);

        /* Game Screen */
        #game-screen {
            color: white; font-size: 1.2rem; font-weight: bold; display: flex; align-items: center; justify-content: center; font-family: Arial, sans-serif;
            flex-direction: column;

        }

        .scoreboard {
            display: flex;
            gap: 40px;
            background: white;
            padding: 15px 40px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);

        }

        .score-item {
            text-align: center;
        }

        .score-label {
            font-size: 0.9rem;
            color: #666;
            font-weight: 600;
        }

        .score-value {
            font-family: 'Fredoka One', cursive;
            font-size: 2rem;
            color: var(--dark);
        }

        .score-item.active .score-value {
            color: var(--primary);
        }

        .turn-indicator {
            font-weight: 700;
            color: var(--secondary);
            font-size: 1.1rem;
        }

        .timer-display {
            font-family: 'Fredoka One', cursive;
            font-size: 1.5rem;
            color: var(--dark);
            background: white;
            padding: 10px 25px;
            border-radius: 15px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .timer-display.urgent {
            color: var(--primary);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            max-width: 800px;
            width: 100%;
        }

        .game-board .tile {
            aspect-ratio: 1;
            perspective: 1000px;
            cursor: pointer;
            transform: none;
            transform-origin: center center;
            width: 110px; height: 110px;
        }

        .tile-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.5s;
            transform-style: preserve-3d;
        }

        .tile.flipped .tile-inner {
            transform: rotateY(180deg);
        }

        .tile.matched {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.5s, visibility 0.5s;
        }

        .tile-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .tile-front {
            background: var(--tile-back);
            background-size: cover;
        }

        .tile-front::before {
            content: '🐾';
            font-size: 3.5rem;
            opacity: 0.5;
        }

        .tile-back {
            background: white;
            transform: rotateY(180deg);
            border: 3px solid var(--secondary);
            padding: 5px;
        }

        .tile-back img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

            font-weight: 700;
            padding: 12px 30px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 6px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        .btn-restart {
            background: var(--accent);
            color: var(--dark);
        }

        .btn-menu {
            background: var(--dark);
            color: white;

        /* Winner Modal */
        #winner-modal {
            color: white; font-size: 1.2rem; font-weight: bold; display: flex; align-items: center; justify-content: center; font-family: Arial, sans-serif;

        .modal-content h2 {

<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loading-dog">🐕</div>
        <div class="loading-text">Loading Dog Breed Match...</div>
        <div class="loading-bar"><div class="loading-progress"></div></div>
    </div>

    <!-- Welcome Screen (Wizard Step 1) -->
    <div id="welcome-screen" style="display: none;">
        <div class="welcome-content">
            <div class="welcome-dog">🐾</div>
            <h1 class="game-title">Dog Breed Match</h1>
            <p class="welcome-tagline">Test your memory with adorable dog breeds!</p>
            <button class="start-btn" onclick="showNameScreen()">START GAME</button>
        </div>
    </div>

    <!-- Name Input Screen (Wizard Step 2) -->
    <div id="name-screen" style="display: none;">
        <h2>👤 Who's Playing?</h2>
        <div class="name-inputs-wizard">
            <div class="name-input">
                <label>Player 1</label>
                <input type="text" id="wiz-p1-name" placeholder="Enter name" value="Player 1">
            </div>
            <div class="name-input" id="wiz-p2-group" style="display: none;">
                <label>Player 2</label>
                <input type="text" id="wiz-p2-name" placeholder="Enter name" value="Player 2">
            </div>
        </div>
        <button class="start-btn" onclick="showModeScreen()">Continue ➡️</button>
    </div>


    <!-- Game Screen -->
    <div id="mode-screen" style="display: none;">
        <h2>Choose Your Game Mode</h2>
        <div class="mode-buttons">
            <button class="mode-btn single" onclick="startGame('single')">👤 Single Player</button>
            <button class="mode-btn two-player" onclick="startGame('two')">👥 Two Players</button>
        </div>
    </div>

    <div id="game-screen">
        <div class="scoreboard">
            <div class="score-item" id="p1-score-box">
                <div class="score-label" id="p1-label">Player 1</div>
                <div class="score-value" id="p1-score">0</div>
            </div>
            <div class="timer-display" id="timer">00:00</div>
            <div class="score-item" id="p2-score-box">
                <div class="score-label" id="p2-label">Player 2</div>
                <div class="score-value" id="p2-score">0</div>
            </div>
        </div>
        <div class="turn-indicator" id="turn-indicator"></div>
        
        <div class="game-board" id="game-board"></div>
        
        <div class="controls">
            <button class="btn btn-restart" onclick="restartGame()">🔄 Restart Game</button>
            <button class="btn btn-menu" onclick="showModeScreen()">🏠 Main Menu</button>
        </div>
    </div>

    <!-- Winner Modal -->
    <div id="winner-modal" style="display: none;">
        <div class="modal-content">
            <h2 id="winner-title">🎉 Game Over!</h2>
            <p id="winner-message"></p>
            <p class="modal-time" id="game-time"></p>
            <button class="mode-btn single" onclick="showModeScreen()">Play Again</button>
        </div>
    </div>

    <script>
        // Dog breed data with images
        const dogBreeds = [
            { name: 'Labrador', image: 'images/001-cartoon-caricature-of-a-labrador-retriev.png' },
            { name: 'German Shepherd', image: 'images/001-cartoon-caricature-of-a-german-shepherd-.png' },
            { name: 'Golden Retriever', image: 'images/001-cartoon-caricature-of-a-golden-retriever.png' },
            { name: 'French Bulldog', image: 'images/001-cartoon-caricature-of-a-french-bulldog-d.png' },
            { name: 'Bulldog', image: 'images/001-cartoon-caricature-of-a-bulldog-dog-face.png' },
            { name: 'Poodle', image: 'images/001-cartoon-caricature-of-a-poodle-dog-face-.png' },
            { name: 'Beagle', image: 'images/001-cartoon-caricature-of-a-beagle-dog-face-.png' },
            { name: 'Rottweiler', image: 'images/001-cartoon-caricature-of-a-rottweiler-dog-f.png' },
            { name: 'Yorkshire Terrier', image: 'images/001-cartoon-caricature-of-a-yorkshire-terrie.png' },
            { name: 'Boxer', image: 'images/001-cartoon-caricature-of-a-boxer-dog-face-f.png' },
            { name: 'Dachshund', image: 'images/001-cartoon-caricature-of-a-dachshund-dog-fa.png' },
            { name: 'Siberian Husky', image: 'images/001-cartoon-caricature-of-a-siberian-husky-d.png' }
        ];

        let gameMode = 'single';
        let scores = { p1: 0, p2: 0 };
        let currentPlayer = 1;
        let flippedTiles = [];
        let matchedPairs = 0;
        let isLocked = false;
        
        // Timer variables
        let timerInterval = null;
        let secondsElapsed = 0;
        let player1Name = 'Player 1';
        let player2Name = 'Player 2';

        // Wizard flow functions
        function initWizard() {
            // Simulate loading
            setTimeout(() => {
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('welcome-screen').style.display = 'flex';
            }, 2000);
        }
        function showNameScreen() {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('name-screen').style.display = 'flex';
        }
        function showModeScreenFromWizard() {
            // Get names from wizard
            player1Name = document.getElementById('wiz-p1-name').value.trim() || 'Player 1';
            player2Name = document.getElementById('wiz-p2-name').value.trim() || 'Player 2';
            document.getElementById('name-screen').style.display = 'none';
            document.getElementById('mode-screen').style.display = 'flex';
        }
        function showModeScreen() {
            document.getElementById('name-screen').style.display = 'none';
            document.getElementById('mode-screen').style.display = 'flex';
        }
        function showWelcomeScreen() {
            document.getElementById('mode-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('welcome-screen').style.display = 'flex';
        }

        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function startGame(mode) {
            // Get player names
            player1Name = document.getElementById('p1-name').value.trim() || 'Player 1';
            player2Name = document.getElementById('p2-name').value.trim() || 'Player 2';
            
            gameMode = mode;
            document.getElementById('mode-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('winner-modal').style.display = 'none';
            
            // Show/hide player 2 based on mode
            const p2Box = document.getElementById('p2-score-box');
            const p2Label = document.getElementById('p2-label');
            if (mode === 'single') {
                p2Box.style.display = 'none';
                p2Label.textContent = player2Name;
            } else {
                p2Box.style.display = 'block';
                p2Label.textContent = player2Name;
            }
            
            // Show player 1 name in label
            document.getElementById('p1-label').textContent = player1Name;
            
            initGame();
        }

        function initGame() {
            scores = { p1: 0, p2: 0 };
            currentPlayer = 1;
            flippedTiles = [];
            matchedPairs = 0;
            isLocked = false;

            // Reset and start timer
            stopTimer();
            secondsElapsed = 0;
            updateTimerDisplay();
            startTimer();

            updateScoreboard();
            createBoard();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                secondsElapsed++;
                updateTimerDisplay();
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(secondsElapsed / 60);
            const seconds = secondsElapsed % 60;
            const timerEl = document.getElementById('timer');
            timerEl.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            // Add urgent styling after 2 minutes
            if (secondsElapsed >= 120) {
                timerEl.classList.add('urgent');
            } else {
                timerEl.classList.remove('urgent');
            }
        }

        function formatTime() {
            const minutes = Math.floor(secondsElapsed / 60);
            const seconds = secondsElapsed % 60;
            if (minutes === 0) {
                return `${seconds} seconds`;
            }
            return `${minutes} minute${minutes > 1 ? 's' : ''} and ${seconds} second${seconds !== 1 ? 's' : ''}`;
        }

        function createBoard() {
            const board = document.getElementById('game-board');
            board.innerHTML = '';

            // Create pairs - each image appears twice
            const tiles = [...dogBreeds, ...dogBreeds];
            const shuffled = shuffle(tiles);

            shuffled.forEach((breed, index) => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.dataset.index = index;
                tile.dataset.breed = breed.name;
                tile.onclick = () => flipTile(tile);

                tile.innerHTML = `
                    <div class="tile-inner">
                        <div class="tile-face tile-front"></div>
                        <div class="tile-face tile-back">
                            <img src="${breed.image}" alt="${breed.name}">
                        </div>
                    </div>
                `;

                board.appendChild(tile);
            });
        }

        function flipTile(tile) {
            // Prevent clicking during animation or invalid clicks
            if (isLocked) return;
            if (tile.classList.contains('flipped')) return;
            if (tile.classList.contains('matched')) return;
            if (flippedTiles.length >= 2) return;
            if (flippedTiles.includes(tile)) return;

            tile.classList.add('flipped');
            flippedTiles.push(tile);

            if (flippedTiles.length === 2) {
                checkMatch();
            }
        }

        function checkMatch() {
            isLocked = true;
            const [tile1, tile2] = flippedTiles;
            const isMatch = tile1.dataset.breed === tile2.dataset.breed;

            if (isMatch) {
                handleMatch(tile1, tile2);
            } else {
                handleMismatch(tile1, tile2);
            }
        }

        function handleMatch(tile1, tile2) {
            setTimeout(() => {
                tile1.classList.add('matched');
                tile2.classList.add('matched');
                
                scores[currentPlayer === 1 ? 'p1' : 'p2']++;
                matchedPairs++;
                
                updateScoreboard();
                flippedTiles = [];
                isLocked = false;

                checkGameEnd();
            }, 500);
        }

        function handleMismatch(tile1, tile2) {
            setTimeout(() => {
                tile1.classList.remove('flipped');
                tile2.classList.remove('flipped');
                
                flippedTiles = [];
                isLocked = false;

                // Switch player in 2-player mode
                if (gameMode === 'two') {
                    currentPlayer = currentPlayer === 1 ? 2 : 1;
                    updateScoreboard();
                }
            }, 1200);
        }

        function updateScoreboard() {
            document.getElementById('p1-score').textContent = scores.p1;
            document.getElementById('p2-score').textContent = scores.p2;

            const p1Box = document.getElementById('p1-score-box');
            const p2Box = document.getElementById('p2-score-box');
            const indicator = document.getElementById('turn-indicator');

            if (gameMode === 'two') {
                p1Box.classList.toggle('active', currentPlayer === 1);
                p2Box.classList.toggle('active', currentPlayer === 2);
                const currentName = currentPlayer === 1 ? player1Name : player2Name;
                indicator.textContent = `${currentName}'s Turn`;
            } else {
                p1Box.classList.remove('active');
                p2Box.classList.remove('active');
                indicator.textContent = '';
            }
        }

        function checkGameEnd() {
            if (matchedPairs === 12) {
                stopTimer();
                
                const modal = document.getElementById('winner-modal');
                const title = document.getElementById('winner-title');
                const message = document.getElementById('winner-message');
                const timeEl = document.getElementById('game-time');

                const timeStr = formatTime();

                if (gameMode === 'single') {
                    title.textContent = '🎉 Congratulations!';
                    message.textContent = `You matched all pairs in ${scores.p1} moves!`;
                } else {
                    if (scores.p1 > scores.p2) {
                        title.textContent = `🏆 ${player1Name} Wins!`;
                        message.textContent = `${player1Name}: ${scores.p1} - ${player2Name}: ${scores.p2}`;
                    } else if (scores.p2 > scores.p1) {
                        title.textContent = `🏆 ${player2Name} Wins!`;
                        message.textContent = `${player2Name}: ${scores.p2} - ${player1Name}: ${scores.p1}`;
                    } else {
                        title.textContent = '🤝 It\'s a Draw!';
                        message.textContent = `Both players scored ${scores.p1} points!`;
                    }
                }

                timeEl.textContent = `Game time: ${timeStr}`;
                modal.style.display = 'flex';
            }
        }

        function restartGame() {
            initGame();
        }

        function showModeScreen() {
            stopTimer();
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('winner-modal').style.display = 'none';
            document.getElementById('mode-screen').style.display = 'flex';
            
            // Reset timer display
            document.getElementById('timer').textContent = '00:00';
            document.getElementById('timer').classList.remove('urgent');
        }
    </script>
</body>
</html>
<script>window.onload = initWizard;</script>
